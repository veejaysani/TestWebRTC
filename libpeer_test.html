<!doctype html>
<html lang="en">
  <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/mqtt@4.1.0/dist/mqtt.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css">
  <title>libpeer test (trickle ICE fix)</title>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-light" data-bs-theme="light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">libpeer test <span class="badge bg-success">trickle ICE fix</span></a>
    <div class="collapse navbar-collapse" id="navbarColor03">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="https://github.com/sepfy/libpeer">Github</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
  <div class="container mt-4">
    <div class="mb-4">
      <div class="row mb-2 g-2 align-items-center">
        <div class="col-12 col-md-1">
          <p class="h5 mb-0">URL:</p>
        </div>
        <div class="col-12 col-md-7">
          <p class="h5 mb-0 text-break" id="device-url"></p>
        </div>
        <div class="col-12 col-md-4 d-flex flex-wrap align-items-center gap-3">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="camera-switch">
            <label class="form-check-label" for="camera-switch">Camera</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="microphone-switch">
            <label class="form-check-label" for="microphone-switch">Microphone</label>
          </div>
          <button class="btn btn-outline-dark ms-md-auto" id="connect">Connect</button>
        </div>
      </div>
      <div class="row mb-2 g-2 align-items-center">
        <div class="col-12 col-md-1">
          <p class="h5 mb-0">Status:</p>
        </div>
        <div class="col-12 col-md-11">
          <p class="h5 mb-0 text-break" id="status">Disconnected</p>
        </div>
      </div>
    </div>
    <div class="row g-4">
      <div class="col-md-6 d-none">
        <div class="p-3 border bg-light text-center">
          <h5>Video</h5>
          <video controls id="video-stream" class="w-100" style="max-height: 400px; display: none">
            <p>Your browser does not support the video element.</p>
          </video>
          <img id="img-stream" class="w-100">
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border bg-light text-center mb-3 d-none">
          <h5>Audio</h5>
          <audio controls id="audio-stream" class="w-100">
            <p>Your browser does not support the audio element.</p>
          </audio>
        </div>

        <div class="p-3 border bg-light text-center">
          <h5>DataChannel</h5>
            <div class="mb-2 d-flex gap-2 justify-content-center">
              <button class="btn btn-success" id="valve-on-btn" disabled>Valve On</button>
              <button class="btn btn-danger" id="valve-off-btn" disabled>Valve Off</button>
            </div>
            <textarea id="datachannel-input" class="form-control" rows="12"></textarea>
        </div>
      </div>
    </div>
  </div>

<script>

const queryString = window.location.search
const urlParams = new URLSearchParams(queryString)
const deviceId = urlParams.get("id")
const resultTopic = "/public/" + deviceId + "/result"
const invokeTopic = "/public/" + deviceId + "/invoke"
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt')

function getRandomItem(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function generateRadomId() {
  const appearance = ["fluffy", "spotted", "striped", "sleek", "furry", "shiny"];
  const personality = ["brave", "calm", "happy", "kind", "lazy", "smart"];
  const animals = ["lion", "tiger", "panda", "fox", "rabbit", "eagle"];
  const randomAppearance = getRandomItem(appearance);
  const randomPersonality = getRandomItem(personality);
  const randomAnimal = getRandomItem(animals);
  return `${randomAppearance}-${randomPersonality}-${randomAnimal}`;
}

window.onload = function() {
  if (deviceId == undefined) {
    const randomId = generateRadomId();
    window.location.href = window.location.href + "?id=" + randomId;
  }
  document.getElementById("device-url").innerHTML = "mqtts://broker.emqx.io/public/" + deviceId;
  const canvas = document.createElement('canvas')
  canvas.width = 640
  canvas.height = 480
  const ctx = canvas.getContext('2d')
  ctx.fillStyle = 'rgba(200, 200, 200, 100)'
  ctx.fillRect(0, 0, 640, 480)
  const img = new Image(640, 480)
  img.src = canvas.toDataURL()
  document.getElementById('img-stream').src = img.src;
}

var offerId = Math.floor((Math.random() * 1000) + 1);
var answerId = Math.floor((Math.random() * 1000) + 1);
var closeId = Math.floor((Math.random() * 1000) + 1);

var pc = new RTCPeerConnection({
  iceServers: [
    {
      urls: "stun:stun.l.google.com:19302",
    },
  ],
});

const datachannel = pc.createDataChannel("libpeer")

pc.ontrack = (e) => {
  if (e.track.kind == "video") {
    var el = document.getElementById('video-stream');
    var newStream = new MediaStream();
    newStream.addTrack(e.track);
    el.srcObject = newStream;
    el.autoplay = true
    el.controls = false
    el.muted = true
    document.getElementById("img-stream").style.display = "none";
    document.getElementById("video-stream").style.display = "block";
  } else if (e.track.kind == "audio") {
    var el = document.getElementById("audio-stream");
    var newStream = new MediaStream();
    newStream.addTrack(e.track);
    el.srcObject = newStream;
    el.autoplay = true
    el.controls = true
    el.muted = true
  }
}

pc.oniceconnectionstatechange = (e) => {
  document.getElementById("status").innerHTML = pc.iceConnectionState;
}

pc.ondatachannel = () => {
  console.log('ondatachannel');
}

datachannel.onclose = () => {
  console.log('[DC] closed. readyState=', datachannel.readyState);
  updateTextarea("--- datachannel closed ---");
}
datachannel.onerror = (e) => {
  console.log('[DC] error:', e);
  updateTextarea("--- datachannel error: " + (e.error && e.error.message) + " ---");
}

function updateTextarea(text) {
  const currentTime = new Date().toLocaleTimeString();
  const timestamp = `[${currentTime}] `;
  const textarea = document.getElementById("datachannel-input");
  textarea.value += (textarea.value ? "\n" : "") + timestamp + text;
  textarea.scrollTop = textarea.scrollHeight;
}

function sendOnDataChannel(msg) {
  if (datachannel.readyState !== "open") {
    console.log('[DC] cannot send, readyState=', datachannel.readyState);
    return;
  }
  console.log('[DC] sending:', msg);
  updateTextarea(">>> " + msg);
  datachannel.send(msg);
}

datachannel.onopen = () => {
  console.log('datachannel has opened');
  document.getElementById("valve-on-btn").disabled = false;
  document.getElementById("valve-off-btn").disabled = false;
  setInterval(() => {
    sendOnDataChannel("ping");
  }, 60000);
}

const VALVE_ON_JSON  = '{"name_space":"CDM","seq":0,"content":{"Header":{"cdmmsgtype":8,"flags":0,"MsgExcID":0},"Body":{"2":[{"0":100,"1":2372,"2":0,"3":{"0":true,"1":"cloud"}}]}}}';
const VALVE_OFF_JSON = '{"name_space":"CDM","seq":0,"content":{"Header":{"cdmmsgtype":8,"flags":0,"MsgExcID":0},"Body":{"2":[{"0":100,"1":2372,"2":0,"3":{"0":false,"1":"cloud"}}]}}}';

document.getElementById("valve-on-btn").addEventListener("click", () => {
  console.log('sending cdml for valve on: ' + VALVE_ON_JSON);
  updateTextarea('sending cdml for valve on: ' + VALVE_ON_JSON);
  sendOnDataChannel(VALVE_ON_JSON);
});
document.getElementById("valve-off-btn").addEventListener("click", () => {
  console.log('sending cdml for valve off: ' + VALVE_OFF_JSON);
  updateTextarea('sending cdml for valve off: ' + VALVE_OFF_JSON);
  sendOnDataChannel(VALVE_OFF_JSON);
});

datachannel.onmessage = (e) => {
  console.log('[DC] onmessage fired. type=', typeof e.data, 'data=', e.data);
  if (typeof e.data === "string") {
    console.log('[DC] string message:', e.data);
    updateTextarea("<<< " + e.data);
  } else if (e.data instanceof ArrayBuffer) {
    var bytes = new Uint8Array(e.data);
    // Try to decode as UTF-8 text first — pong may arrive as binary
    var asText = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
    var isPrintable = /^[\x09\x0A\x0D\x20-\x7E]+$/.test(asText);
    console.log('[DC] binary message, length=', bytes.length, 'first bytes=',
      Array.from(bytes.slice(0, 16)).map(b => b.toString(16).padStart(2,'0')).join(' '),
      'asText=', JSON.stringify(asText));
    if (isPrintable && bytes.length < 64) {
      // Looks like a short text payload (e.g. "pong") sent as binary
      updateTextarea("<<< (bin) " + asText);
    } else {
      var blob = new Blob([bytes], { type: "image/jpeg" });
      var urlCreator = window.URL || window.webkitURL;
      var imageUrl = urlCreator.createObjectURL(blob);
      document.getElementById('img-stream').src = imageUrl;
    }
  } else if (e.data instanceof Blob) {
    console.log('[DC] blob message, size=', e.data.size);
    e.data.text().then(t => {
      console.log('[DC] blob as text:', t);
      updateTextarea("<<< (blob) " + t);
    });
  } else {
    console.log('[DC] unknown data type');
    updateTextarea("<<< (unknown) " + e.data);
  }
}

// Make sure we receive ArrayBuffer instead of Blob so we can inspect bytes
datachannel.binaryType = "arraybuffer";

// --- TRICKLE ICE FIX ---
// Log each candidate as it arrives (for debugging in DevTools console)
pc.onicecandidate = (e) => {
  if (e.candidate) {
    console.log('[ICE] candidate:', e.candidate.candidate);
  } else {
    console.log('[ICE] gathering complete (null candidate)');
  }
}

// REMOVED: pc.onicegatheringstatechange that waited for "complete" (caused 40s delay)
// Instead, the answer is sent after a 2-second timeout in the message handler below.
// 2 seconds is plenty — host + srflx candidates gather in < 1 second.
// The 40s wait was caused by TCP/mDNS candidate timeouts that the device can't use anyway.

client.on('connect', () => {
  console.log("connected")
  client.subscribe(resultTopic, (err) => {})
})

document.getElementById("connect").addEventListener("click", async () => {
  const cameraSwitch = document.getElementById("camera-switch");
  const microphoneSwitch = document.getElementById("microphone-switch");
  const constraints = {
    video: cameraSwitch.checked,
    audio: microphoneSwitch.checked,
  }

  if (constraints.video || constraints.audio) {
    await navigator.mediaDevices.getUserMedia(constraints).then(stream => {
      stream.getTracks().forEach(track => { console.log(track); pc.addTrack(track, stream)});
    }).catch((e) => {
      alert(e)
    });
  }

  client.publish(invokeTopic, JSON.stringify({
    jsonrpc: "2.0",
    method: "offer",
    id: offerId,
  }))
})

client.on("message", (topic, message) => {
  let msg = JSON.parse(message.toString())
  if (msg.id == offerId) {
    console.log(msg.result)
    pc.setRemoteDescription({type: "offer", sdp: msg.result});
    pc.createAnswer().then(d => {
      // Force browser to be DTLS server so MCU (client) sends small ClientHello
      d.sdp = d.sdp.replace(/a=setup:active/g, "a=setup:passive");
      return pc.setLocalDescription(d);
    }).then(() => {
      // TRICKLE ICE FIX: wait 500ms for UDP candidates to gather,
      // then send the answer. This avoids the 40s wait for TCP/mDNS timeouts.
      setTimeout(() => {
        console.log('[ICE] Sending answer after 500ms (candidates in SDP):');
        console.log(pc.localDescription.sdp);
        client.publish(invokeTopic, JSON.stringify({
          jsonrpc: "2.0",
          method: "answer",
          params: pc.localDescription.sdp,
          id: answerId,
        }))
      }, 500);
    });
  }
})
</script>

</body>
</html>
